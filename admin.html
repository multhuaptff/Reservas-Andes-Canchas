<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Andes Sport - Panel Administrativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🔧 Administración de Reservas</h1>
    <div class="toolbar">
        <label>Fecha: <input type="date" id="fecha"></label>
        <button id="btn-anterior">←</button>
        <button id="btn-siguiente">→</button>
        <button id="btn-hoy">Hoy</button>
        <select id="granularidad">
            <option value="30">30 min</option>
            <option value="60">1 hora</option>
        </select>
    </div>
    <div id="horario-container"></div>
</div>

<!-- Modal mejorado con cliente y costo estimado -->
<div id="modal-reserva" class="modal">
    <div class="modal-content">
        <h3>Nueva Reserva</h3>
        <label>Responsable: <input type="text" id="responsable" required></label><br>
        <label>Teléfono (opcional): <input type="text" id="telefono"></label><br>
        <label>Cliente (opcional):
            <select id="cliente-id">
                <option value="">Sin cliente</option>
            </select>
        </label><br>
        <label>Tipo de reserva:
            <select id="tipo-reserva">
                <option value="individual">Individual (solo esta cancha)</option>
            </select>
        </label><br>
        <label>Costo estimado: <span id="costo-estimado">S/ 0.00</span></label><br>
        <label>Adelanto (S/): <input type="number" id="adelanto" step="0.01" value="0"></label><br>
        <label>Método de pago:
            <select id="metodo_pago">
                <option value="efectivo">Efectivo</option>
                <option value="yape">Yape</option>
            </select>
        </label><br>
        <label>Observaciones: <input type="text" id="observaciones"></label><br>
        <button id="guardar-reserva">Guardar</button>
        <button id="cancelar-reserva">Cancelar</button>
    </div>
</div>

<script type="module">
    import { supabase } from './supabase-client.js';
    import { initAdminView } from './script.js';
    initAdminView(supabase);
</script>
</body>
</html>
